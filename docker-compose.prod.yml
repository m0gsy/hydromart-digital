# Production overlay for a single VPS. Merge on top of the base infra file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Base file (docker-compose.yml) provides postgres (init-databases.sql creates all
# per-service DBs) + redis. This overlay adds the 15 app services + the web app.
#
# All secrets come from the environment (see .env.production.example). ${VAR:?msg}
# fails the command if VAR is unset — no secret is ever hardcoded here.
# Only `gateway` (8080) and `web` (3000) are published to the host; every other
# service is reachable only on the internal docker network.

x-shared: &shared
  NODE_ENV: production
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET (min 32 chars)}
  INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:?set INTERNAL_SERVICE_KEY}
  # Optional error alerting: Slack/Discord/webhook URL. Blank = disabled (no 5xx pings).
  ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}

x-svc: &svc
  restart: unless-stopped
  depends_on:
    postgres: { condition: service_healthy }
    redis: { condition: service_healthy }

services:
  # Override only the postgres password with the prod secret; user, db, volume,
  # init script AND port publishing all come from the base file (which publishes
  # 5432/6379). We deliberately do NOT re-declare `ports` here: Compose CONCATENATES
  # port lists across files, so a second entry would double-bind and fail to boot.
  # Postgres/Redis therefore stay on the host's published 5432/6379 — lock them down
  # with a host firewall (see DEPLOY.md §1); the internet must not reach them.
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}

  auth:
    <<: *svc
    build: { context: ., dockerfile: services/auth-service/Dockerfile }
    environment:
      <<: *shared
      AUTH_SERVICE_PORT: 3001
      AUTH_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_auth?schema=public
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET (min 32 chars)}
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_TTL: 2592000
      OTP_TTL_SECONDS: 300
      OTP_LENGTH: 6
      OTP_MAX_ATTEMPTS: 5
      OTP_RESEND_COOLDOWN_SECONDS: 60
      # `console` only prints the code to the container log — real customers can
      # never receive it. Set OTP_DELIVERY_CHANNEL to `zenziva` (Indonesian SMS
      # provider in use) or `sms` (generic gateway) in .env, plus that channel's
      # credentials below, before taking real signups.
      OTP_DELIVERY_CHANNEL: ${OTP_DELIVERY_CHANNEL:-console}
      ZENZIVA_BASE_URL: ${ZENZIVA_BASE_URL:-https://console.zenziva.net}
      ZENZIVA_USERKEY: ${ZENZIVA_USERKEY:-}
      ZENZIVA_PASSKEY: ${ZENZIVA_PASSKEY:-}
      SMS_API_BASE_URL: ${SMS_API_BASE_URL:-}
      SMS_API_TOKEN: ${SMS_API_TOKEN:-}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-HYDROMART}
      OTP_PEPPER: ${OTP_PEPPER:?set OTP_PEPPER}
      CRM_SERVICE_URL: http://crm:3012
      # Object storage for customer avatar photos. BiznetGio NEO (S3-compatible);
      # per-bucket keys, so auth uses its own bucket/creds (see AUTH_STORAGE_* in .env).
      # Reuse the product bucket+creds if you prefer one bucket — avatars live under
      # the avatars/ prefix, products under products/, so they never collide.
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:?set STORAGE_S3_ENDPOINT (e.g. https://nos.jkt-1.neo.id)}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-jkt-1}
      STORAGE_S3_BUCKET: ${AUTH_STORAGE_S3_BUCKET:?set AUTH_STORAGE_S3_BUCKET}
      STORAGE_S3_ACCESS_KEY_ID: ${AUTH_STORAGE_S3_ACCESS_KEY_ID:?set AUTH_STORAGE_S3_ACCESS_KEY_ID}
      STORAGE_S3_SECRET_ACCESS_KEY: ${AUTH_STORAGE_S3_SECRET_ACCESS_KEY:?set AUTH_STORAGE_S3_SECRET_ACCESS_KEY}
      STORAGE_PUBLIC_BASE_URL: ${AUTH_STORAGE_PUBLIC_BASE_URL:?set AUTH_STORAGE_PUBLIC_BASE_URL (e.g. https://nos.jkt-1.neo.id/hydromart-avatars)}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  customer:
    <<: *svc
    build: { context: ., dockerfile: services/customer-service/Dockerfile }
    environment:
      <<: *shared
      CUSTOMER_SERVICE_PORT: 3002
      CUSTOMER_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_customer?schema=public
      MAX_ADDRESSES_PER_CUSTOMER: 20
      LOYALTY_SERVICE_URL: http://loyalty:3009
      BIRTHDAY_REWARD_POINTS: 250
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  product:
    <<: *svc
    build: { context: ., dockerfile: services/product-service/Dockerfile }
    environment:
      <<: *shared
      PRODUCT_SERVICE_PORT: 3003
      PRODUCT_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_product?schema=public
      # Object storage for product images. BiznetGio NEO (S3-compatible); per-bucket
      # keys, so product uses its own bucket/creds (see PRODUCT_STORAGE_* in .env).
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:?set STORAGE_S3_ENDPOINT (e.g. https://nos.jkt-1.neo.id)}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-jkt-1}
      STORAGE_S3_BUCKET: ${PRODUCT_STORAGE_S3_BUCKET:?set PRODUCT_STORAGE_S3_BUCKET}
      STORAGE_S3_ACCESS_KEY_ID: ${PRODUCT_STORAGE_S3_ACCESS_KEY_ID:?set PRODUCT_STORAGE_S3_ACCESS_KEY_ID}
      STORAGE_S3_SECRET_ACCESS_KEY: ${PRODUCT_STORAGE_S3_SECRET_ACCESS_KEY:?set PRODUCT_STORAGE_S3_SECRET_ACCESS_KEY}
      STORAGE_PUBLIC_BASE_URL: ${PRODUCT_STORAGE_PUBLIC_BASE_URL:?set PRODUCT_STORAGE_PUBLIC_BASE_URL (e.g. https://nos.jkt-1.neo.id/hydromart-products)}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  order:
    <<: *svc
    build: { context: ., dockerfile: services/order-service/Dockerfile }
    environment:
      <<: *shared
      ORDER_SERVICE_PORT: 3004
      ORDER_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_order?schema=public
      PRODUCT_SERVICE_URL: http://product:3003
      DEPOT_SERVICE_URL: http://depot:3007
      LOYALTY_SERVICE_URL: http://loyalty:3009
      PROMO_SERVICE_URL: http://promo:3010
      REFERRAL_SERVICE_URL: http://referral:3011
      CRM_SERVICE_URL: http://crm:3012
      RECOMMENDATION_SERVICE_URL: http://recommendation:3013
      FORECAST_SERVICE_URL: http://forecast:3014
      ORDER_DELIVERY_FEE: 5000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3004/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  payment:
    <<: *svc
    build: { context: ., dockerfile: services/payment-service/Dockerfile }
    environment:
      <<: *shared
      PAYMENT_SERVICE_PORT: 3005
      PAYMENT_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_payment?schema=public
      # Blank in dev/self-hosted = online charges fail closed until a real gateway is wired.
      PAYMENT_GATEWAY_BASE_URL: ${PAYMENT_GATEWAY_BASE_URL:-}
      PAYMENT_GATEWAY_API_KEY: ${PAYMENT_GATEWAY_API_KEY:-}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:?set PAYMENT_WEBHOOK_SECRET (min 16 chars)}
      ORDER_SERVICE_URL: http://order:3004
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3005/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  delivery:
    <<: *svc
    build: { context: ., dockerfile: services/delivery-service/Dockerfile }
    environment:
      <<: *shared
      DELIVERY_SERVICE_PORT: 3006
      DELIVERY_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_delivery?schema=public
      ORDER_SERVICE_URL: http://order:3004
      DEPOT_SERVICE_URL: http://depot:3007
      # PAID-cash total for COD settlement (design 2d, fail-closed).
      PAYMENT_SERVICE_URL: http://payment:3005
      # HIGH field incidents (4b) push to the ops feed via crm; reuses DEPOT_ALERT_PHONE.
      CRM_SERVICE_URL: http://crm:3012
      OPS_ALERT_PHONE: ${DEPOT_ALERT_PHONE:-}
      # Courier earning push on delivery completion (design 6b, internal key).
      PAYOUT_SERVICE_URL: http://payout:3016
      MAX_ACTIVE_DELIVERIES_PER_DRIVER: 1
      SHIFT_CHECKIN_RADIUS_M: 200
      SHIFT_LENGTH_HOURS: 8
      SHIFT_BREAK_QUOTA_MINUTES: 30
      NO_SHOW_MIN_CONTACT_ATTEMPTS: 2
      NO_SHOW_MIN_WAIT_SECONDS: 300
      DELIVERY_SLA_MINUTES: 120
      # Object storage for PoD photo + signature. BiznetGio NEO (S3-compatible);
      # per-bucket keys, so delivery uses its own bucket/creds (see DELIVERY_STORAGE_* in .env).
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:?set STORAGE_S3_ENDPOINT (e.g. https://nos.jkt-1.neo.id)}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-jkt-1}
      STORAGE_S3_BUCKET: ${DELIVERY_STORAGE_S3_BUCKET:?set DELIVERY_STORAGE_S3_BUCKET}
      STORAGE_S3_ACCESS_KEY_ID: ${DELIVERY_STORAGE_S3_ACCESS_KEY_ID:?set DELIVERY_STORAGE_S3_ACCESS_KEY_ID}
      STORAGE_S3_SECRET_ACCESS_KEY: ${DELIVERY_STORAGE_S3_SECRET_ACCESS_KEY:?set DELIVERY_STORAGE_S3_SECRET_ACCESS_KEY}
      STORAGE_PUBLIC_BASE_URL: ${DELIVERY_STORAGE_PUBLIC_BASE_URL:?set DELIVERY_STORAGE_PUBLIC_BASE_URL (e.g. https://nos.jkt-1.neo.id/hydromart-pod)}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3006/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  depot:
    <<: *svc
    build: { context: ., dockerfile: services/depot-service/Dockerfile }
    environment:
      <<: *shared
      DEPOT_SERVICE_PORT: 3007
      DEPOT_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_depot?schema=public
      CRM_SERVICE_URL: http://crm:3012
      DEPOT_ALERT_PHONE: ${DEPOT_ALERT_PHONE:-}
      GALLON_DEPOSIT_IDR: ${GALLON_DEPOSIT_IDR:-20000}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3007/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  dashboard:
    <<: *svc
    build: { context: ., dockerfile: services/dashboard-service/Dockerfile }
    environment:
      <<: *shared
      DASHBOARD_SERVICE_PORT: 3008
      ORDER_SERVICE_URL: http://order:3004
      DELIVERY_SERVICE_URL: http://delivery:3006
      DEPOT_SERVICE_URL: http://depot:3007
      ADMIN_SERVICE_URL: http://admin:3017
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3008/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  loyalty:
    <<: *svc
    build: { context: ., dockerfile: services/loyalty-service/Dockerfile }
    environment:
      <<: *shared
      LOYALTY_SERVICE_PORT: 3009
      LOYALTY_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_loyalty?schema=public
      LOYALTY_EARN_RATE_RUPIAH: 1000
      LOYALTY_POINT_EXPIRY_MONTHS: 12
      # Depot-scoped loyalty summary resolves a depot's customers via customer-service
      # (x-internal-key from *shared). Blank/unreachable → summary returns zeros (fail-open).
      CUSTOMER_SERVICE_URL: http://customer:3002
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3009/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  promo:
    <<: *svc
    build: { context: ., dockerfile: services/promo-service/Dockerfile }
    environment:
      <<: *shared
      PROMO_SERVICE_PORT: 3010
      PROMO_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_promo?schema=public
      ORDER_SERVICE_URL: http://order:3004
      # Outbound for the "voucher baru" grant notification (spec 5h). INTERNAL_SERVICE_KEY
      # comes from *shared; blank URLs → grant succeeds, notification is skipped (fail-open).
      CRM_SERVICE_URL: http://crm:3012
      CUSTOMER_SERVICE_URL: http://customer:3002
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3010/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  referral:
    <<: *svc
    build: { context: ., dockerfile: services/referral-service/Dockerfile }
    environment:
      <<: *shared
      REFERRAL_SERVICE_PORT: 3011
      REFERRAL_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_referral?schema=public
      LOYALTY_SERVICE_URL: http://loyalty:3009
      CUSTOMER_SERVICE_URL: http://customer:3002
      REFERRAL_REFERRER_POINTS: 500
      REFERRAL_REFEREE_POINTS: 250
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3011/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  crm:
    <<: *svc
    build: { context: ., dockerfile: services/crm-service/Dockerfile }
    environment:
      <<: *shared
      CRM_SERVICE_PORT: 3012
      CRM_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_crm?schema=public
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      CUSTOMER_SERVICE_URL: http://customer:3002
      # Web Push (design 7b). Blank = push disabled; the app still stores + WhatsApps.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:ops@hydromart.id}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3012/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  recommendation:
    <<: *svc
    build: { context: ., dockerfile: services/recommendation-service/Dockerfile }
    environment:
      <<: *shared
      RECOMMENDATION_SERVICE_PORT: 3013
      RECOMMENDATION_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_recommendation?schema=public
      ORDER_SERVICE_URL: http://order:3004
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3013/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  forecast:
    <<: *svc
    build: { context: ., dockerfile: services/forecast-service/Dockerfile }
    environment:
      <<: *shared
      FORECAST_SERVICE_PORT: 3014
      FORECAST_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_forecast?schema=public
      CHURN_WINDOW_DAYS: 45
      DEPOT_SERVICE_URL: http://depot:3007
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3014/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  payout:
    <<: *svc
    build: { context: ., dockerfile: services/payout-service/Dockerfile }
    environment:
      <<: *shared
      PAYOUT_SERVICE_PORT: 3016
      PAYOUT_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_payout?schema=public
      PAYOUT_COMMISSION_RATE: ${PAYOUT_COMMISSION_RATE:-0.05}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3016/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  admin:
    <<: *svc
    build: { context: ., dockerfile: services/admin-service/Dockerfile }
    environment:
      <<: *shared
      ADMIN_SERVICE_PORT: 3017
      ADMIN_DATABASE_URL: postgresql://hydromart:${POSTGRES_PASSWORD}@postgres:5432/hydromart_admin?schema=public
      # Peer service base URLs probed by the aggregate system-health roll-up (13b).
      AUTH_SERVICE_URL: http://auth:3001
      CUSTOMER_SERVICE_URL: http://customer:3002
      PRODUCT_SERVICE_URL: http://product:3003
      ORDER_SERVICE_URL: http://order:3004
      PAYMENT_SERVICE_URL: http://payment:3005
      DELIVERY_SERVICE_URL: http://delivery:3006
      DEPOT_SERVICE_URL: http://depot:3007
      DASHBOARD_SERVICE_URL: http://dashboard:3008
      LOYALTY_SERVICE_URL: http://loyalty:3009
      PROMO_SERVICE_URL: http://promo:3010
      REFERRAL_SERVICE_URL: http://referral:3011
      CRM_SERVICE_URL: http://crm:3012
      RECOMMENDATION_SERVICE_URL: http://recommendation:3013
      FORECAST_SERVICE_URL: http://forecast:3014
      PAYOUT_SERVICE_URL: http://payout:3016
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3017/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  gateway:
    <<: *svc
    build: { context: ., dockerfile: services/gateway-service/Dockerfile }
    environment:
      <<: *shared
      GATEWAY_PORT: 8080
      # Public web origin(s) allowed to call the API from the browser (comma-separated).
      # Must include the prod site or browser CORS blocks every credentialed fetch.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      AUTH_SERVICE_URL: http://auth:3001
      CUSTOMER_SERVICE_URL: http://customer:3002
      PRODUCT_SERVICE_URL: http://product:3003
      ORDER_SERVICE_URL: http://order:3004
      PAYMENT_SERVICE_URL: http://payment:3005
      DELIVERY_SERVICE_URL: http://delivery:3006
      DEPOT_SERVICE_URL: http://depot:3007
      DASHBOARD_SERVICE_URL: http://dashboard:3008
      LOYALTY_SERVICE_URL: http://loyalty:3009
      PROMO_SERVICE_URL: http://promo:3010
      REFERRAL_SERVICE_URL: http://referral:3011
      CRM_SERVICE_URL: http://crm:3012
      RECOMMENDATION_SERVICE_URL: http://recommendation:3013
      FORECAST_SERVICE_URL: http://forecast:3014
      PAYOUT_SERVICE_URL: http://payout:3016
      ADMIN_SERVICE_URL: http://admin:3017
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL is FROZEN into the client bundle at build time — a
        # wrong value ships a bundle that tells every visitor's browser to call
        # the wrong host, and only a rebuild fixes it. REQUIRED, no default: an
        # unset PUBLIC_API_URL fails the build rather than silently baking localhost.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?set PUBLIC_API_URL to the PUBLIC gateway origin (e.g. https://api.example.com or http://<vps-ip>:8080) before building}
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Cron sidecar that drives the internal sweep endpoints on order-service (nothing
  # else calls them). Hourly: place due subscription orders. Daily 08:00: refill
  # reminders. Auths with the shared INTERNAL_SERVICE_KEY over the internal network;
  # alpine's busybox crond, no extra image build. Disable with `docker compose ...
  # up -d --scale scheduler=0`. Shift schedule times by setting TZ (e.g. TZ: Asia/Jakarta).
  scheduler:
    <<: *svc
    image: alpine:3.20
    environment:
      <<: *shared
      TZ: ${SCHEDULER_TZ:-UTC}
    depends_on:
      order: { condition: service_healthy }
    volumes:
      - ./scripts/scheduler/crontab:/etc/crontabs/root:ro
      - ./scripts/scheduler:/scripts:ro
    command: ["sh", "/scripts/entrypoint.sh"]

  # Prometheus scrapes every service's /metrics (enableMetrics()). Bound to
  # loopback only — reach the UI via SSH tunnel, never expose to the internet.
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  # Grafana dashboards over Prometheus. Loopback only (SSH tunnel to view).
  # Set GRAFANA_ADMIN_PASSWORD in .env; defaults to admin on first boot otherwise.
  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3300:3000"

  # Opt-in TLS reverse proxy. Enable with `--profile tls`; without the profile the
  # stack serves plain HTTP on the published :3000/:8080 (fine behind your own proxy
  # or for a bare-IP test). With it, Caddy terminates HTTPS on 80/443 and reaches
  # web/gateway over the internal network — firewall off 3000/8080 (or bind them to
  # 127.0.0.1) so the public only hits Caddy. See DEPLOY.md §6.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["tls"]
    depends_on:
      - web
      - gateway
    environment:
      # Empty default (not ${VAR:?}) so the non-tls path still renders — compose
      # interpolates every service even when this one is profiled out. With the tls
      # profile you MUST set these in .env (Caddy can't get a cert for an empty host).
      WEB_DOMAIN: ${WEB_DOMAIN:-}
      API_DOMAIN: ${API_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
