name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prisma 5.x evaluates env("<SVC>_DATABASE_URL") at `prisma validate`/`migrate`
# time, so both jobs need these defined. verify only needs them to parse (no
# connection); integration actually migrates against the compose Postgres.
env:
  AUTH_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_auth?schema=public
  CUSTOMER_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_customer?schema=public
  PRODUCT_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_product?schema=public
  ORDER_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_order?schema=public
  PAYMENT_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_payment?schema=public
  DELIVERY_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_delivery?schema=public
  DEPOT_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_depot?schema=public
  LOYALTY_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_loyalty?schema=public
  PROMO_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_promo?schema=public
  REFERRAL_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_referral?schema=public
  CRM_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_crm?schema=public
  RECOMMENDATION_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_recommendation?schema=public
  FORECAST_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_forecast?schema=public
  PAYOUT_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_payout?schema=public
  ADMIN_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_admin?schema=public
  HR_DATABASE_URL: postgresql://hydromart:hydromart@localhost:5432/hydromart_hr?schema=public

jobs:
  verify:
    runs-on: ubuntu-latest
    # These are only for the unit/e2e gate. The e2e specs call
    # ConfigModule.forRoot({ validationSchema }), which validates process.env
    # (their `load` block feeds the app, but Joi still checks env). Dummy-but-
    # valid values only — NOT real secrets. Deliberately NOT at workflow scope:
    # the integration job's flow.mjs signs test JWTs from these and must instead
    # use its own defaults that match docker-compose.test.yml, or auth breaks.
    env:
      JWT_ACCESS_SECRET: ci-jwt-access-secret-that-is-long-enough-0123456789
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-that-is-long-enough-0123456789
      OTP_PEPPER: ci-otp-pepper-value
      PAYMENT_WEBHOOK_SECRET: ci-payment-webhook-secret-16plus
      WHATSAPP_API_BASE_URL: https://wa.example.com
      WHATSAPP_API_TOKEN: ci-whatsapp-token
      SMS_API_BASE_URL: https://sms.example.com
      SMS_API_TOKEN: ci-sms-token
      AUTH_SERVICE_URL: https://auth.example.com
      CUSTOMER_SERVICE_URL: https://customer.example.com
      PRODUCT_SERVICE_URL: https://product.example.com
      ORDER_SERVICE_URL: https://order.example.com
      PAYMENT_SERVICE_URL: https://payment.example.com
      DELIVERY_SERVICE_URL: https://delivery.example.com
      DEPOT_SERVICE_URL: https://depot.example.com
      LOYALTY_SERVICE_URL: https://loyalty.example.com
      PROMO_SERVICE_URL: https://promo.example.com
      REFERRAL_SERVICE_URL: https://referral.example.com
      CRM_SERVICE_URL: https://crm.example.com
      RECOMMENDATION_SERVICE_URL: https://recommendation.example.com
      FORECAST_SERVICE_URL: https://forecast.example.com
      DASHBOARD_SERVICE_URL: https://dashboard.example.com
      HR_SERVICE_URL: https://hr.example.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Installs all workspaces and generates every Prisma client (postinstall).
      - name: Install
        run: npm ci

      # Static schema validation — no database required.
      - name: Validate Prisma schemas
        run: npm run db:validate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Runs jest with --coverage so the per-service coverageThreshold gates fail CI on
      # a coverage regression (QG-1). Thresholds are a ratchet floor at current levels
      # on the money-critical services; raise them toward 90% as tests are added.
      - name: Test (with coverage gate)
        run: npm run test:cov

      - name: Build
        run: npm run build

  # Boots the whole prod artifact (all 15 Docker images) via docker-compose and drives
  # the core loop over real HTTP — catches deploy-only bugs the unit gate can't (Dockerfile
  # ordering, Prisma engine/OpenSSL, stale lockfile, missing env). Runs in parallel to verify.
  integration:
    runs-on: ubuntu-latest
    # Host-side `db:migrate` (run.mjs) applies migrations to the compose Postgres over the
    # published port; each service's schema resolves env("<SVC>_DATABASE_URL") from the
    # workflow-level env above.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Pre-start infra and wait until Postgres accepts connections (initdb creates all 13
      # databases) so the runner's db:migrate doesn't race a cold Postgres in CI.
      - name: Start infra + wait for Postgres
        run: |
          docker compose up -d postgres redis
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U hydromart -d hydromart_auth; then exit 0; fi
            sleep 2
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Integration test (build + boot all 15 images, drive core loop)
        run: npm run test:integration

  # Browser E2E (QG-1): boots the same test backend the integration job uses, serves
  # the web app locally against the gateway, and drives the public flows with Playwright.
  # The web app isn't in the CI compose (prod-only), so we `next start` it here instead of
  # containerising it — same gateway, no extra image to build.
  e2e:
    runs-on: ubuntu-latest
    env:
      # Must match docker-compose.test.yml so seed.mjs can mint an admin token the stack trusts.
      JWT_ACCESS_SECRET: itest-shared-access-secret-0123456789abcdef
      GATEWAY_URL: http://localhost:8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
      # authed.spec reads the OTP back from the auth-service log (console channel).
      # Deterministic under compose regardless of the runner's project name.
      # Playwright runs with cwd=apps/web (npm workspace), where `docker compose` finds
      # no compose file — so point at the running container by name (compose project =
      # checkout dir "hydromart-digital"). cwd-independent; the OTP scraper execSyncs this.
      E2E_OTP_LOG_CMD: docker logs --tail 4000 hydromart-digital-auth-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Start infra + wait for Postgres
        run: |
          docker compose up -d postgres redis
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U hydromart -d hydromart_auth; then break; fi
            sleep 2
          done

      - name: Migrate + boot services
        run: |
          npm run db:migrate
          # --wait blocks until every healthchecked service is healthy — the gateway
          # /health alone can be up while product-service isn't, which 504'd the seed.
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build --wait --wait-timeout 300
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then break; fi
            sleep 2
          done

      - name: Seed catalog + staff
        run: node scripts/seed.mjs

      - name: Build + serve web
        run: |
          npm run build --workspace @hydromart/web
          nohup npm run start --workspace @hydromart/web >/tmp/web.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then break; fi
            sleep 2
          done

      - name: Install Playwright browser
        run: npm run test:e2e:install --workspace @hydromart/web

      - name: Run E2E
        run: npm run test:e2e --workspace @hydromart/web

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
