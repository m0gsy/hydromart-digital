# Local development infrastructure for Hydromart.
# Requires Docker. Brings up PostgreSQL and Redis for the auth-service.
#   docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: hydromart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydromart
      POSTGRES_PASSWORD: hydromart
      POSTGRES_DB: hydromart_auth
    ports:
      - '5432:5432'
    volumes:
      - hydromart_pgdata:/var/lib/postgresql/data
      # Creates the per-service databases (each microservice owns its own schema).
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hydromart -d hydromart_auth']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hydromart-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - hydromart_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hydromart_pgdata:
  hydromart_redisdata:
